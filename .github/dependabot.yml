version: 2
enable-beta-ecosystems: true

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      every: 2
    open-pull-requests-limit: 5
    versioning-strategy: increase
    commit-message:
      prefix: 'chore'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automerge-candidate'
